name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black mypy
      
      - name: Run Ruff linter
        run: ruff check app/ alembic/
      
      - name: Run Black formatter check
        run: black --check app/ alembic/
      
      - name: Run mypy type check
        run: mypy app/ --ignore-missing-imports

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_saas_crm
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_saas_crm
        run: |
          cd Saas-Backend
          alembic upgrade head
      
      - name: Run seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_saas_crm
        run: |
          cd Saas-Backend
          python -m app.scripts.seed
      
      - name: Run pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_saas_crm
          JWT_SECRET: test-secret-key
        run: |
          cd Saas-Backend
          pytest -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run safety check
        run: |
          pip install safety
          safety check --json > security_report.json || true
      
      - name: Run bandit security scan
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit_report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            security_report.json
            bandit_report.json
          retention-days: 30
