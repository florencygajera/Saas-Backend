name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          alembic upgrade head
      
      - name: Run seed (staging only)
        if: github.event.inputs.environment == 'staging'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m app.scripts.seed
      
      - name: Install test dependencies
        run: |
          pip install pytest httpx

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          pytest -v
      
      - name: Deploy via SSH
        if: github.event.inputs.environment == 'production'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/saas-backend
            git pull origin main
            pip install -r requirements.txt
            alembic upgrade head
            systemctl restart saas-backend
            sleep 5
            curl -f http://localhost:8001/health || exit 1

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: Wait for deployment
        run: sleep 10
      
      - name: Check API health
        run: |
          curl -f https://api.${{ github.event.inputs.environment }}.example.com/health || exit 1

      - name: Check API docs
        run: |
          curl -f https://api.${{ github.event.inputs.environment }}.example.com/docs || exit 1
